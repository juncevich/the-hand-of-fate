name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - proto/**
      - .github/workflows/backend.yml
  pull_request:
    paths:
      - backend/**
      - proto/**
      - .github/workflows/backend.yml

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  backend-test:
    name: Backend — Test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.4-alpine
        env:
          POSTGRES_DB: fate_test
          POSTGRES_USER: fate
          POSTGRES_PASSWORD: fate
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate proto sources
        run: cd backend && ./gradlew generateProto --no-daemon -q --rerun-tasks

      - name: Run tests
        run: cd backend && ./gradlew test --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/fate_test
          DB_USERNAME: fate
          DB_PASSWORD: fate
          JWT_ACCESS_SECRET: test-secret-key-256-bits-long-for-tests-xxxxxx

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

  backend-build:
    name: Backend — Build JAR
    runs-on: ubuntu-24.04
    needs: backend-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate proto sources
        run: cd backend && ./gradlew generateProto --no-daemon -q --rerun-tasks

      - run: cd backend && ./gradlew bootJar --no-daemon -x test

      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar
