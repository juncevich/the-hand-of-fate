name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Backend ──────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:17.4-alpine
        env:
          POSTGRES_DB: fate_test
          POSTGRES_USER: fate
          POSTGRES_PASSWORD: fate
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Generate proto sources
        run: cd backend && ./gradlew generateProto --no-daemon -q

      - name: Run tests
        run: cd backend && ./gradlew test --no-daemon
        env:
          DB_URL: jdbc:postgresql://localhost:5432/fate_test
          DB_USERNAME: fate
          DB_PASSWORD: fate
          JWT_ACCESS_SECRET: test-secret-key-256-bits-long-for-tests-xxxxxx

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/build/reports/tests/

  backend-build:
    name: Backend — Build JAR
    runs-on: ubuntu-24.04
    needs: backend-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - uses: gradle/actions/setup-gradle@v4
      - run: cd backend && ./gradlew bootJar --no-daemon -x test
      - uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/*.jar

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Test & Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: cd frontend && npm ci
      - run: cd frontend && npm run test
      - run: cd frontend && npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ── Bot ───────────────────────────────────────────────────────────────────────
  bot-test:
    name: Bot — Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: bot/go.sum

      - name: Generate proto
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          sudo apt-get install -y protobuf-compiler
          mkdir -p bot/gen/fate/v1
          protoc -I proto \
            --go_out=bot/gen --go_opt=paths=source_relative \
            --go-grpc_out=bot/gen --go-grpc_opt=paths=source_relative \
            proto/fate.proto

      - run: cd bot && go vet ./...
      - run: cd bot && go test ./...

  # ── Docker images ─────────────────────────────────────────────────────────────
  build-images:
    name: Build & Push Docker images
    runs-on: ubuntu-24.04
    needs: [backend-test, frontend-test, bot-test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/juncevich/fate-backend:${{ github.sha }}
            ghcr.io/juncevich/fate-backend:latest
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ghcr.io/juncevich/fate-frontend:${{ github.sha }}
            ghcr.io/juncevich/fate-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Build & push bot
        uses: docker/build-push-action@v6
        with:
          context: bot
          push: true
          tags: |
            ghcr.io/juncevich/fate-bot:${{ github.sha }}
            ghcr.io/juncevich/fate-bot:latest
          cache-from: type=gha,scope=bot
          cache-to:   type=gha,scope=bot,mode=max
