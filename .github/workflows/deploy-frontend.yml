name: Deploy Frontend

on:
  workflow_run:
    workflows: [Frontend CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:

  gate:
    name: CI Gate
    runs-on: ubuntu-24.04
    outputs:
      ready:  ${{ steps.check.outputs.ready }}
      run-id: ${{ steps.check.outputs.run_id }}

    steps:
      - name: Check Frontend CI and resolve artifact run
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            run_id=$(gh run list --repo "${{ github.repository }}" --workflow "Frontend CI" \
              --branch main --status success --limit 1 --json databaseId -q '.[0].databaseId // ""')
            if [ -z "$run_id" ]; then
              echo "::error::No successful Frontend CI run found on main"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            conclusion="${{ github.event.workflow_run.conclusion }}"
            if [ "$conclusion" != "success" ]; then
              echo "::error::Deploy skipped: Frontend CI concluded with «${conclusion}»"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            run_id="${{ github.event.workflow_run.id }}"
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "ready=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy Frontend to VPS
    runs-on: ubuntu-24.04
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    environment: staging

    env:
      HOST:         ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT:  ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_DIR:   /opt/hand-of-fate
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Validate secrets
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "::error::Missing secret: DEPLOY_SSH_KEY" >&2
            exit 1
          fi

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend
          run-id: ${{ needs.gate.outputs.run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        run: |
          sudo apt-get install -y ssh rsync
          echo "$DEPLOY_SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem

      - name: Deploy frontend static files
        run: |
          rsync -avz --delete -e "ssh -i deploy_key.pem -p $DEPLOY_PORT -o StrictHostKeyChecking=no" \
            artifacts/frontend/ "$HOST:$DEPLOY_DIR/frontend/"

      - name: Set file ownership
        run: |
          ssh -i deploy_key.pem -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$HOST" \
            "chown -R fate:fate $DEPLOY_DIR/frontend/"

      - name: Reload Nginx
        run: |
          ssh -i deploy_key.pem -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$HOST" \
            "systemctl reload nginx"
