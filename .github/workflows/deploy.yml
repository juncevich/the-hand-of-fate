name: Deploy

on:
  workflow_run:
    workflows: [Backend CI, Frontend CI, Bot CI]
    types: [completed]
    branches: [main]

  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:

  # ── Проверяем CI и находим артефакты для деплоя ───────────────────────────
  gate:
    name: CI Gate
    runs-on: ubuntu-24.04
    outputs:
      ready:           ${{ steps.check.outputs.ready }}
      backend-run-id:  ${{ steps.check.outputs.backend }}
      frontend-run-id: ${{ steps.check.outputs.frontend }}
      bot-run-id:      ${{ steps.check.outputs.bot }}

    steps:
      - name: Check CI workflows and resolve artifact runs
        id: check
        run: |
          all_ok=true

          REPO="${{ github.repository }}"
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] && \
             [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "::notice::Triggering workflow failed — деплой пропущен"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          resolve_run_id() {
            local workflow="$1"
            local output_name="$2"
            local exact_run=""
            local run_id=""
            local status=""
            local conclusion=""

            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              run_id=$(gh run list --repo "$REPO" --workflow "$workflow" --branch main --status success \
                --limit 1 --json databaseId -q '.[0].databaseId // ""')
              if [ -n "$run_id" ]; then
                echo "$workflow: latest successful run $run_id"
                echo "$output_name=$run_id" >> "$GITHUB_OUTPUT"
                return
              fi
              echo "::notice::$workflow has no successful main run"
              all_ok=false
              return
            fi

            exact_run=$(gh run list --repo "$REPO" --workflow "$workflow" --branch main --commit "$SHA" \
              --limit 1 --json databaseId,status,conclusion \
              -q '.[0] // empty | [.databaseId, .status, (.conclusion // "")] | @tsv')

            if [ -n "$exact_run" ]; then
              IFS=$'\t' read -r run_id status conclusion <<< "$exact_run"
              echo "$workflow for $SHA: $status/$conclusion (run $run_id)"
              if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
                echo "$output_name=$run_id" >> "$GITHUB_OUTPUT"
              else
                all_ok=false
              fi
              return
            fi

            # No run for this commit means the workflow was skipped by path filters.
            # Reuse the latest successful artifact for that unchanged component.
            run_id=$(gh run list --repo "$REPO" --workflow "$workflow" --branch main --status success \
              --limit 1 --json databaseId -q '.[0].databaseId // ""')
            if [ -n "$run_id" ]; then
              echo "$workflow did not run for $SHA; using latest successful run $run_id"
              echo "$output_name=$run_id" >> "$GITHUB_OUTPUT"
            else
              echo "::notice::$workflow did not run for $SHA and has no previous successful artifact"
              all_ok=false
            fi
          }

          resolve_run_id "Backend CI" backend
          resolve_run_id "Frontend CI" frontend
          resolve_run_id "Bot CI" bot

          if $all_ok; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Не все нужные CI-артефакты готовы — деплой пропущен"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-24.04
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    environment: staging

    env:
      HOST: ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_DIRECTORY: /opt/hand-of-fate
      BACKEND_HEALTHCHECK_URL: http://127.0.0.1:8080/actuator/health
      BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
      DB_URL:            ${{ secrets.DB_URL }}
      DB_USERNAME:       ${{ secrets.DB_USERNAME }}
      DB_PASSWORD:       ${{ secrets.DB_PASSWORD }}
      JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
      MAIL_HOST:         ${{ secrets.MAIL_HOST }}
      MAIL_PORT:         ${{ secrets.MAIL_PORT }}
      MAIL_USERNAME:     ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD:     ${{ secrets.MAIL_PASSWORD }}
      FRONTEND_URL:      ${{ secrets.FRONTEND_URL }}
      GRPC_SERVER_ADDR:  ${{ secrets.GRPC_SERVER_ADDR }}
      DEPLOY_SSH_KEY:    ${{ secrets.DEPLOY_SSH_KEY }}

    steps:
      - name: Validate deployment secrets
        run: |
          missing_secrets=()

          required_secrets=(
            DEPLOY_SSH_KEY
            BOT_TOKEN
            DB_URL
            DB_USERNAME
            DB_PASSWORD
            JWT_ACCESS_SECRET
            MAIL_HOST
            MAIL_PORT
            MAIL_USERNAME
            MAIL_PASSWORD
            FRONTEND_URL
            GRPC_SERVER_ADDR
          )

          for secret_name in "${required_secrets[@]}"; do
            if [ -z "${!secret_name:-}" ]; then
              missing_secrets+=("$secret_name")
            fi
          done

          if [ "${#missing_secrets[@]}" -gt 0 ]; then
            printf 'Missing GitHub Actions secrets:\n' >&2
            printf ' - %s\n' "${missing_secrets[@]}" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      # ── Скачиваем артефакты из соответствующих воркфлоу ─────────────────────
      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/backend
          run-id: ${{ needs.gate.outputs.backend-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend
          run-id: ${{ needs.gate.outputs.frontend-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bot binary
        uses: actions/download-artifact@v4
        with:
          name: bot-binary
          path: artifacts/bot
          run-id: ${{ needs.gate.outputs.bot-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifacts
        run: |
          mv artifacts/backend/*.jar artifacts/backend/app.jar
          chmod +x artifacts/bot/fate-bot

      - name: Setup SSH
        run: |
          sudo apt-get install -y ssh rsync
          echo "$DEPLOY_SSH_KEY" > deploy_key.pem
          chmod 600 deploy_key.pem
          ssh -i deploy_key.pem -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$HOST" \
            "mkdir -p ${{ env.DEPLOY_DIRECTORY }}/backend ${{ env.DEPLOY_DIRECTORY }}/frontend ${{ env.DEPLOY_DIRECTORY }}/bot"

      # ── Копируем артефакты на сервер ─────────────────────────────────────────
      - name: Deploy backend JAR
        run: |
          rsync -avz -e "ssh -i deploy_key.pem -p $DEPLOY_PORT -o StrictHostKeyChecking=no" \
            artifacts/backend/app.jar "$HOST:${{ env.DEPLOY_DIRECTORY }}/backend/"

      - name: Deploy frontend static files
        run: |
          rsync -avz --delete -e "ssh -i deploy_key.pem -p $DEPLOY_PORT -o StrictHostKeyChecking=no" \
            artifacts/frontend/ "$HOST:${{ env.DEPLOY_DIRECTORY }}/frontend/"

      - name: Deploy bot binary
        run: |
          rsync -avz -e "ssh -i deploy_key.pem -p $DEPLOY_PORT -o StrictHostKeyChecking=no" \
            artifacts/bot/fate-bot "$HOST:${{ env.DEPLOY_DIRECTORY }}/bot/"

      # ── Записываем env-файл на сервере ───────────────────────────────────────
      - name: Create environment file on server
        run: |
          escape_env_value() {
            printf '%s' "$1" | sed "s/'/'\\\\''/g"
          }

          {
            printf "BOT_TOKEN='%s'\n"         "$(escape_env_value "$BOT_TOKEN")"
            printf "DB_URL='%s'\n"            "$(escape_env_value "$DB_URL")"
            printf "DB_USERNAME='%s'\n"       "$(escape_env_value "$DB_USERNAME")"
            printf "DB_PASSWORD='%s'\n"       "$(escape_env_value "$DB_PASSWORD")"
            printf "JWT_ACCESS_SECRET='%s'\n" "$(escape_env_value "$JWT_ACCESS_SECRET")"
            printf "MAIL_HOST='%s'\n"         "$(escape_env_value "$MAIL_HOST")"
            printf "MAIL_PORT='%s'\n"         "$(escape_env_value "$MAIL_PORT")"
            printf "MAIL_USERNAME='%s'\n"     "$(escape_env_value "$MAIL_USERNAME")"
            printf "MAIL_PASSWORD='%s'\n"     "$(escape_env_value "$MAIL_PASSWORD")"
            printf "FRONTEND_URL='%s'\n"      "$(escape_env_value "$FRONTEND_URL")"
            printf "GRPC_SERVER_ADDR='%s'\n"  "$(escape_env_value "$GRPC_SERVER_ADDR")"
          } | \
          ssh -i deploy_key.pem -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$HOST" \
            "cat > ${{ env.DEPLOY_DIRECTORY }}/.env && chmod 600 ${{ env.DEPLOY_DIRECTORY }}/.env && chown fate:fate ${{ env.DEPLOY_DIRECTORY }}/.env"

      - name: Set file ownership and permissions
        run: |
          ssh -i deploy_key.pem -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$HOST" "
            chown fate:fate ${{ env.DEPLOY_DIRECTORY }}/backend/app.jar
            chown -R fate:fate ${{ env.DEPLOY_DIRECTORY }}/frontend/
            chmod +x ${{ env.DEPLOY_DIRECTORY }}/bot/fate-bot
            chown fate:fate ${{ env.DEPLOY_DIRECTORY }}/bot/fate-bot
          "

      # ── Перезапуск сервисов ───────────────────────────────────────────────────
      - name: Restart services
        run: |
          ssh -i deploy_key.pem -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$HOST" \
            "systemctl daemon-reload && systemctl restart fate-backend && systemctl restart fate-bot && systemctl reload nginx"

      # ── Health check ─────────────────────────────────────────────────────────
      - name: Verify application health
        run: |
          ssh -i deploy_key.pem -p "$DEPLOY_PORT" -o StrictHostKeyChecking=no "$HOST" "
          set -eu
          for attempt in \$(seq 1 24); do
            if curl --silent --show-error --fail ${{ env.BACKEND_HEALTHCHECK_URL }} | grep -q '\"status\":\"UP\"'; then
              echo 'Application is healthy'
              exit 0
            fi
            echo \"Attempt \${attempt}/24...\"
            sleep 5
          done

          echo 'Application did not become healthy in time'
          systemctl status fate-backend --no-pager || true
          journalctl -u fate-backend -n 100 --no-pager || true
          exit 1
          "
