name: Deploy

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    environment: staging
    needs: []  # triggered after ci.yml via workflow_run or direct push
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Deploy with kustomize
        run: |
          cd infra/k8s/overlays/staging
          kustomize edit set image \
            ghcr.io/juncevich/fate-backend=ghcr.io/juncevich/fate-backend:${{ github.sha }} \
            ghcr.io/juncevich/fate-frontend=ghcr.io/juncevich/fate-frontend:${{ github.sha }} \
            ghcr.io/juncevich/fate-bot=ghcr.io/juncevich/fate-bot:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/backend  -n hand-of-fate-staging --timeout=120s
          kubectl rollout status deployment/frontend -n hand-of-fate-staging --timeout=60s
          kubectl rollout status deployment/bot      -n hand-of-fate-staging --timeout=60s

      - name: Smoke test
        run: |
          sleep 10
          curl -f https://staging.fate.example.com/actuator/health || exit 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config

      - name: Deploy with kustomize
        run: |
          cd infra/k8s/overlays/production
          kustomize edit set image \
            ghcr.io/juncevich/fate-backend=ghcr.io/juncevich/fate-backend:${{ github.sha }} \
            ghcr.io/juncevich/fate-frontend=ghcr.io/juncevich/fate-frontend:${{ github.sha }} \
            ghcr.io/juncevich/fate-bot=ghcr.io/juncevich/fate-bot:${{ github.sha }}
          kubectl apply -k .
          kubectl rollout status deployment/backend  -n hand-of-fate --timeout=180s
          kubectl rollout status deployment/frontend -n hand-of-fate --timeout=120s
          kubectl rollout status deployment/bot      -n hand-of-fate --timeout=60s
