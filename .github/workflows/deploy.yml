name: Deploy

on:
  workflow_run:
    workflows: [Backend CI, Frontend CI, Bot CI]
    types: [completed]
    branches: [main]

  workflow_dispatch:

jobs:

  # ── Ждём пока все три CI пройдут для одного коммита ───────────────────────
  gate:
    name: CI Gate
    runs-on: ubuntu-24.04
    outputs:
      ready:           ${{ steps.check.outputs.ready }}
      backend-run-id:  ${{ steps.ids.outputs.backend }}
      frontend-run-id: ${{ steps.ids.outputs.frontend }}
      bot-run-id:      ${{ steps.ids.outputs.bot }}

    steps:
      - name: Check all CI workflows passed
        id: check
        run: |
          all_ok=true

          REPO="${{ github.repository }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # При ручном запуске проверяем последний запуск каждого воркфлоу в main
            for workflow in "Backend CI" "Frontend CI" "Bot CI"; do
              conclusion=$(gh run list \
                --repo "$REPO" --workflow "$workflow" --branch main \
                --limit 1 --json conclusion -q '.[0].conclusion // "none"')
              echo "$workflow: $conclusion"
              [ "$conclusion" = "success" ] || all_ok=false
            done
          else
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "::notice::Triggering workflow failed — деплой пропущен"
              echo "ready=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            SHA="${{ github.event.workflow_run.head_sha }}"
            for workflow in "Backend CI" "Frontend CI" "Bot CI"; do
              # Only consider completed successful runs for this exact SHA
              conclusion=$(gh run list \
                --repo "$REPO" --workflow "$workflow" --branch main --commit "$SHA" \
                --status success --limit 1 --json conclusion -q '.[0].conclusion // ""')
              if [ -z "$conclusion" ]; then
                # Workflow didn't run for this SHA (path filter) or is still running —
                # fall back to latest successful run on main (safe for path-filtered workflows)
                conclusion=$(gh run list \
                  --repo "$REPO" --workflow "$workflow" --branch main --status success \
                  --limit 1 --json conclusion -q '.[0].conclusion // "none"')
                echo "$workflow (fallback to latest successful): $conclusion"
              else
                echo "$workflow: $conclusion"
              fi
              [ "$conclusion" = "success" ] || all_ok=false
            done
          fi

          if $all_ok; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Не все CI прошли успешно — деплой пропущен"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve artifact run IDs
        id: ids
        if: steps.check.outputs.ready == 'true'
        run: |
          REPO="${{ github.repository }}"
          get_run_id() {
            local workflow="$1"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              gh run list --repo "$REPO" --workflow "$workflow" --branch main --status success \
                --limit 1 --json databaseId -q '.[0].databaseId'
            else
              run_id=$(gh run list --repo "$REPO" --workflow "$workflow" --branch main \
                --commit "${{ github.event.workflow_run.head_sha }}" \
                --limit 1 --json databaseId -q '.[0].databaseId // ""')
              if [ -z "$run_id" ]; then
                run_id=$(gh run list --repo "$REPO" --workflow "$workflow" --branch main --status success \
                  --limit 1 --json databaseId -q '.[0].databaseId')
              fi
              echo "$run_id"
            fi
          }
          echo "backend=$(get_run_id 'Backend CI')"   >> "$GITHUB_OUTPUT"
          echo "frontend=$(get_run_id 'Frontend CI')" >> "$GITHUB_OUTPUT"
          echo "bot=$(get_run_id 'Bot CI')"           >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-24.04
    needs: gate
    if: needs.gate.outputs.ready == 'true'

    steps:
      - uses: actions/checkout@v4

      # ── Скачиваем артефакты из соответствующих воркфлоу ─────────────────────
      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/backend
          run-id: ${{ needs.gate.outputs.backend-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend
          run-id: ${{ needs.gate.outputs.frontend-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download bot binary
        uses: actions/download-artifact@v4
        with:
          name: bot-binary
          path: artifacts/bot
          run-id: ${{ needs.gate.outputs.bot-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifacts
        run: |
          mv artifacts/backend/*.jar artifacts/backend/app.jar
          chmod +x artifacts/bot/fate-bot

      # ── Копируем артефакты на сервер ─────────────────────────────────────────
      - name: Copy backend JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          source:   artifacts/backend/app.jar
          target:   /opt/hand-of-fate/backend/
          strip_components: 2

      - name: Copy frontend static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          source:   "artifacts/frontend/*"
          target:   /opt/hand-of-fate/frontend/
          strip_components: 2

      - name: Copy bot binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          source:   artifacts/bot/fate-bot
          target:   /opt/hand-of-fate/bot/
          strip_components: 2

      # ── Записываем env vars и перезапускаем сервисы ──────────────────────────
      - name: Update env and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          port:     ${{ secrets.DEPLOY_PORT || 22 }}
          envs:     BOT_TOKEN,DB_URL,DB_USERNAME,DB_PASSWORD,JWT_ACCESS_SECRET,MAIL_HOST,MAIL_PORT,MAIL_USERNAME,MAIL_PASSWORD,FRONTEND_URL,GRPC_SERVER_ADDR
          script: |
            set -euo pipefail

            # Перезаписываем EnvironmentFile из секретов GitHub
            cat > /opt/hand-of-fate/.env << EOF
            BOT_TOKEN=${BOT_TOKEN}
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
            MAIL_HOST=${MAIL_HOST}
            MAIL_PORT=${MAIL_PORT}
            MAIL_USERNAME=${MAIL_USERNAME}
            MAIL_PASSWORD=${MAIL_PASSWORD}
            FRONTEND_URL=${FRONTEND_URL}
            GRPC_SERVER_ADDR=${GRPC_SERVER_ADDR}
            EOF
            chmod 600 /opt/hand-of-fate/.env
            chown fate:fate /opt/hand-of-fate/.env

            # Права на артефакты
            chown fate:fate /opt/hand-of-fate/backend/app.jar
            chown -R fate:fate /opt/hand-of-fate/frontend/
            chmod +x /opt/hand-of-fate/bot/fate-bot
            chown fate:fate /opt/hand-of-fate/bot/fate-bot

            # Перезапуск сервисов
            systemctl restart fate-backend
            systemctl restart fate-bot
            systemctl reload nginx

            # Health check (ждём до 2 минут)
            echo "Ожидаем старт бэкенда..."
            for i in $(seq 1 24); do
              sleep 5
              if curl -sf http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
                echo "✓ Бэкенд запущен (попытка ${i})"
                exit 0
              fi
              echo "  Попытка ${i}/24..."
            done
            echo "✗ Бэкенд не ответил за 2 минуты"
            journalctl -u fate-backend --no-pager -n 50
            exit 1
        env:
          BOT_TOKEN:         ${{ secrets.BOT_TOKEN }}
          DB_URL:            ${{ secrets.DB_URL }}
          DB_USERNAME:       ${{ secrets.DB_USERNAME }}
          DB_PASSWORD:       ${{ secrets.DB_PASSWORD }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          MAIL_HOST:         ${{ secrets.MAIL_HOST }}
          MAIL_PORT:         ${{ secrets.MAIL_PORT }}
          MAIL_USERNAME:     ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:     ${{ secrets.MAIL_PASSWORD }}
          FRONTEND_URL:      ${{ secrets.FRONTEND_URL }}
          GRPC_SERVER_ADDR:  ${{ secrets.GRPC_SERVER_ADDR }}
