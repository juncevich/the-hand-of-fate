name: hand-of-fate

services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fate
      POSTGRES_USER: fate
      POSTGRES_PASSWORD: fate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fate -d fate"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/juncevich/fate-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP REST
      - "9090:9090"   # gRPC
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/fate
      DB_USERNAME: fate
      DB_PASSWORD: fate
      JWT_ACCESS_SECRET: dev-secret-key-at-least-256-bits-long-for-testing-purposes-only
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 30
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      FRONTEND_URL: http://localhost:3000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ghcr.io/juncevich/fate-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ── Telegram Bot ───────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    image: ghcr.io/juncevich/fate-bot:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      GRPC_SERVER_ADDR: backend:9090
      LOG_LEVEL: info
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27.4-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend

  # ── Mail (local dev only) ──────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  # ── Observability ─────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.123.0
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./infra/monitoring/otel-collector.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - loki
      - mimir

  loki:
    image: grafana/loki:3.4.2
    restart: unless-stopped
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./infra/monitoring/loki.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"

  mimir:
    image: grafana/mimir:2.15.0
    restart: unless-stopped
    command: ["--config.file=/etc/mimir/config.yaml"]
    volumes:
      - ./infra/monitoring/mimir.yaml:/etc/mimir/config.yaml:ro
      - mimir_data:/data/mimir
    ports:
      - "9009:9009"

  grafana:
    image: grafana/grafana:11.6.0
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - mimir

volumes:
  postgres_data:
  loki_data:
  mimir_data:
  grafana_data:
