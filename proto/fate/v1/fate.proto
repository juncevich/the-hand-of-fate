syntax = "proto3";

package fate.v1;

option go_package = "github.com/juncevich/the-hand-of-fate/bot/gen/fate/v1;fatev1";
option java_package = "com.juncevich.fate.grpc";
option java_multiple_files = true;
option java_outer_classname = "FateProto";

service FateService {
  // Link a Telegram account using a short-lived token generated by the web app
  rpc LinkTelegramAccount(LinkTelegramAccountRequest) returns (LinkTelegramAccountResponse);

  // Unlink Telegram account
  rpc UnlinkTelegramAccount(UnlinkTelegramAccountRequest) returns (UnlinkTelegramAccountResponse);

  // List votes the telegram user participates in or created
  rpc GetMyVotes(GetMyVotesRequest) returns (GetMyVotesResponse);

  // Create a vote for the linked telegram user
  rpc CreateVote(CreateVoteRequest) returns (CreateVoteResponse);

  // Get detailed info about a vote
  rpc GetVoteDetails(GetVoteDetailsRequest) returns (GetVoteDetailsResponse);

  // Perform a draw (only vote creator can do this)
  rpc DrawVote(DrawVoteRequest) returns (DrawVoteResponse);

  // Get the last draw result for a vote
  rpc GetLastDrawResult(GetLastDrawResultRequest) returns (GetLastDrawResultResponse);

  // Get draw history for a vote
  rpc GetVoteHistory(GetVoteHistoryRequest) returns (GetVoteHistoryResponse);
}

// ── Link / Unlink ─────────────────────────────────────────────────────────────

message LinkTelegramAccountRequest {
  string link_token    = 1;
  int64  telegram_id   = 2;
  string telegram_name = 3;
}

message LinkTelegramAccountResponse {
  bool   success      = 1;
  string display_name = 2;
  string message      = 3;
}

message UnlinkTelegramAccountRequest {
  int64 telegram_id = 1;
}

message UnlinkTelegramAccountResponse {
  bool   success = 1;
  string message = 2;
}

// ── Vote queries ──────────────────────────────────────────────────────────────

message GetMyVotesRequest {
  int64 telegram_id = 1;
}

message GetMyVotesResponse {
  repeated VoteSummary votes = 1;
}

message CreateVoteRequest {
  int64 telegram_id = 1;
  string title = 2;
  string description = 3;
  VoteMode mode = 4;
  repeated string participant_emails = 5;
}

message CreateVoteResponse {
  bool success = 1;
  string message = 2;
  GetVoteDetailsResponse vote = 3;
}

message VoteSummary {
  string vote_id           = 1;
  string title             = 2;
  VoteStatus status        = 3;
  VoteMode   mode          = 4;
  int32  participant_count = 5;
  bool   is_creator        = 6;
  int32  current_round     = 7;
}

message GetVoteDetailsRequest {
  string vote_id    = 1;
  int64  telegram_id = 2;
}

message GetVoteDetailsResponse {
  string vote_id             = 1;
  string title               = 2;
  string description         = 3;
  VoteMode   mode            = 4;
  VoteStatus status          = 5;
  int32  current_round       = 6;
  repeated ParticipantInfo participants = 7;
  DrawResultInfo last_result = 8;
}

message ParticipantInfo {
  string email        = 1;
  string display_name = 2;
  int32  win_count    = 3;
}

message DrawResultInfo {
  string winner_email        = 1;
  string winner_display_name = 2;
  int32  round               = 3;
  string drawn_at            = 4;  // ISO-8601
}

// ── Draw ──────────────────────────────────────────────────────────────────────

message DrawVoteRequest {
  string vote_id    = 1;
  int64  telegram_id = 2;
}

message DrawVoteResponse {
  bool   success             = 1;
  string winner_email        = 2;
  string winner_display_name = 3;
  int32  round               = 4;
  bool   new_round_started   = 5;
  string message             = 6;
}

message GetLastDrawResultRequest {
  string vote_id = 1;
  int64 telegram_id = 2;
}

message GetLastDrawResultResponse {
  bool           has_result = 1;
  DrawResultInfo result     = 2;
}

message GetVoteHistoryRequest {
  string vote_id = 1;
  int64 telegram_id = 2;
}

message GetVoteHistoryResponse {
  repeated DrawResultInfo results = 1;
}

// ── Enums ─────────────────────────────────────────────────────────────────────

enum VoteStatus {
  VOTE_STATUS_UNSPECIFIED = 0;
  VOTE_STATUS_PENDING     = 1;
  VOTE_STATUS_DRAWN       = 2;
  VOTE_STATUS_CLOSED      = 3;
}

enum VoteMode {
  VOTE_MODE_UNSPECIFIED    = 0;
  VOTE_MODE_SIMPLE         = 1;
  VOTE_MODE_FAIR_ROTATION  = 2;
}
